app = 'kis-api'
primary_region = 'iad'

[http_service]
  auto_start_machines = true
  auto_stop_machines = 'stop'
  force_https = false
  internal_port = 8080
  min_machines_running = 0
  processes = ['app']

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory = '1gb'
  memory_mb = 256
